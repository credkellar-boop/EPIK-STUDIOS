name: EPIC-STUDIO'S CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint Code for Syntax Errors
      run: |
        # Install flake8 linting engine
        python -m pip install flake8
        # Stop the build if there are critical Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Treat all complexity and line-length warnings as status alerts rather than hard pipeline failures
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify Configuration File Integrity
      run: |
        # Ensures your config.json matches valid JSON schemas so your backend doesn't crash on launch
        if [ -f config.json ]; then python -c "import json; json.load(open('config.json'))"; fi

